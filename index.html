<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<img id="bg" src="img/background.jpg">

<div class="overlay"></div>

<div class="content">

    <div class="server-info">

        <div class="server-name" id="servername">
            LOADING SERVER
        </div>

        <div class="server-meta">
            <span id="gamemode">Unknown Gamemode</span>
            •
            <span id="mapname">Unknown Map</span>
        </div>

    </div>

    <div class="download-panel">

        <div class="status" id="status">
            Initializing...
        </div>

        <div class="file" id="currentFile">
            Waiting for files...
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="progress-text">
            <span id="downloadedFiles">0</span>
            /
            <span id="totalFiles">0</span>
            files
        </div>

    </div>

    <div class="tip" id="tip">
        Press F4 for jobs
    </div>

</div>

<audio id="bgMusic" loop preload="auto">
    <source src="music/song.mp3" type="audio/mpeg">
</audio>

<script src="js/main.js"></script>

</body>
</html>
